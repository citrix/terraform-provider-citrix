# Based on https://github.com/hashicorp/terraform-provider-scaffolding-framework/blob/main/.golangci.yml
version: "2"

run:
  timeout: 10m

linters:
  default: none

  enable:
    # Custom Linters - See custom-linters/README.md
    - panichandler     # Enforce defer util.PanicHandler(&resp.Diagnostics) in SDK methods
    - unknowncheck     # Enforce IsUnknown() before IsNull() in ValidateConfig/ModifyPlan
    - executewithretry # Enforce ExecuteWithRetry wrapper for API GET calls
    
    # Static Analysis
    - gocheckcompilerdirectives # Compiler directive checks
    - govet            # Official Go static analyzer
    - staticcheck      # Advanced static analysis
    
    # Error Handling
    - errcheck         # Unchecked errors
    - errname          # Error variable naming
    - errorlint        # Misuse of errors
    - nilerr           # Returning nil with non-nil error check
    - nilnesserr       # err != nil but returns nil
    - nilnil           # Simultaneous nil error and nil value returns
    
    # Code Quality
    - containedctx     # Context not in struct
    - contextcheck     # Context argument misuse
    - ineffassign      # Unused assignments
    - predeclared      # Shadowing of predeclared identifiers
    - mirror           # WriteString(string) instead of Write([]byte()) etc
    - nakedret         # No naked returns
    - nonamedreturns   # No named returns
    - unparam          # Unused function parameters
    - unused           # Unused code
    - unconvert        # Unnecessary type conversions
    - wastedassign     # Advanced unused assignments
    
    # Best Practices
    - copyloopvar      # Loop variable copies
    - durationcheck    # Multiplied durations
    - errchkjson       # Check JSON types
    - exhaustive       # Exhaustive handling of enums
    - exptostd         # Standard library functions
    - fatcontext       # Nested contexts in loops
    - forbidigo        # No print functions
    - goprintffuncname # fmt.Printf-like function names  
    - iface            # Interface pollution
    - importas         # Consistent import aliases
    - inamedparam      # Interfaces with unnamed parameters
    - intrange         # Integer range checks
    - iotamixing       # Mixing iota in consts
    - gochecksumtype   # Switches handle all types
    - makezero         # Slices with non-zero initial length
    - musttag          # Field tags in marshalled structs
    - noctx            # HTTP methods without context
    - nosprintfhostport # Sprintf host:port formatting
    - tagalign         # Struct field tag alignment
    - reassign         # Package variable reassignments 
    - usestdlibvars    # Standard library variables

    # Code Style & Documentation
    - embeddedstructfieldcheck # Embedded struct fields
    - forcetypeassert # Prefer value, ok casting
    - goheader        # Citrix copyright header
    - misspell        # Commonly misspelled words
    - nolintlint      # Ill-formed nolint directives
    - whitespace      # Unnecessary whitespace
    
    # Security & Safety
    - asciicheck       # Non-ASCII characters
    - bidichk          # Dangerous unicode characters
    - gosec            # Common security issues
    
    # Testing
    - testifylint      # Testify best practices
    - tparallel        # Test parallelism checks
    - usetesting       # os/context functions in tests with replacements

  settings:
    errcheck:
      # Do not report about not checking of errors in type assertions: `a := b.(MyStruct)`.
      check-type-assertions: false
      # Report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`.
      check-blank: true
      # List of functions to exclude from checking.
      exclude-functions: []
    exhaustive:
      check:
        - switch
        - map
      ignore-enum-types: "(reflect.Kind)|(citrixorchestration.HypervisorConnectionType)" # We do not support all hypervisor types yet
      ignore-enum-members: ".*UNKNOWN"
    goheader:
      template: |-
        Copyright © {{ YEAR }}. Citrix Systems, Inc.
    gosec:
      excludes:
        - G115 # integer overflow, we go from int64 in TF schema -> int32 in the autogenerated client
      config:
        G101:
          "pattern": "^$" # disable entropy checking (too many false positives) to just rely on the secrets patterns: https://github.com/securego/gosec/blob/master/rules/hardcoded_credentials.go#L35
    nolintlint:
      require-explanation: true
      require-specific: true
    staticcheck:
      # default rule exclusions from https://golangci-lint.run/docs/linters/configuration/#staticcheck plus ST1005: errors should not start with a capital letter or end with a period.
      checks: ["all", "-ST1000", "-ST1003", "-ST1005", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
      http-status-code-whitelist: []
    custom:
      panichandler:
        type: "module"
        description: Checks that Terraform provider SDK interface functions start with defer util.PanicHandler(&resp.Diagnostics)
        path: ./custom-linters
      unknowncheck:
        type: "module"
        description: Checks that IsUnknown() is called before IsNull() in ValidateConfig and ModifyPlan functions
        path: ./custom-linters
      executewithretry:
        type: "module"
        description: Checks that API GET calls use ExecuteWithRetry wrapper instead of calling Execute() directly for proper resilience
        path: ./custom-linters

  exclusions:
    rules:
      # Allow nilnil returns in custom-linters (mock functions and analyzer code) and don't use the custom-linters on themselves (their negative tests would be flagged)
      - path: custom-linters
        linters:
          - nilnil
          - panichandler
          - unknowncheck
          - executewithretry
      # Allow nilnil and errcheck issues in test code
      - path: test
        linters:
          - nilnil
          - errcheck
      
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
